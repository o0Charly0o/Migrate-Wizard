uuid: 82a06fc1-cea5-4f2b-a52c-f8eea526269b
langcode: null
status: true
dependencies:
  enforced:
    module:
      - migrate_wizard
id: article_drupal7
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - drupal7
migration_group: drupal7
label: article
source:
  plugin: mw_d7_node
  constants:
    file_destination: 'public://migrate/'
    start_alias: /
    langcode: null
    source_base_path: 'http://drupal7.ddev.site'
  key: migrate
  mw_database: drupal7
  bundle: article
  node_type: article
  origin_type: node
process:
  type:
    plugin: default_value
    default_value: article
  created: created
  status: status
  nid: nid
  uid:
    plugin: migration_lookup
    migration: users_drupal7
    source: node_uid
    no_stub: true
  title:
    -
      plugin: skip_on_empty
      source: title
      method: row
  pseudo_body:
    -
      plugin: skip_on_empty
      source: body
      method: process
  pseudo_body_destiny:
    -
      plugin: concat_data
      source:
        - '@pseudo_body'
  body:
    -
      plugin: sub_process
      source: '@pseudo_body_destiny'
      process:
        value: value
        summary: summary
        format:
          plugin: static_map
          source: format
          map:
            filtered_html: restricted_html
            full_html: full_html
            plain_text: plain_text
          default_value: full_html
  field_tags:
    -
      plugin: skip_on_empty
      source: field_tags
      method: process
    -
      plugin: sub_process
      method: process
      process:
        target_id:
          plugin: migration_lookup
          source: tid
          migration:
            - none
          no_stub: true
  pseudo_field_image:
    -
      plugin: skip_on_empty
      source: field_image
      method: process
    -
      plugin: sub_process
      method: process
      process:
        bundle: bundle
        field_name_destiny: field_media_image
        source_full_path:
          -
            plugin: mw_concat
            delimiter: /
            source:
              - source_base_path
              - filepath
          -
            plugin: urlencode
        uri_dest:
          plugin: mw_file_copy
          source:
            - '@source_full_path'
            - uri
        fid:
          plugin: mw_process_entity_file
          source:
            - '@source_full_path'
            - '@uri_dest'
            - filename
            - filemime
            - filesize
            - status
            - created
            - changed
            - uid
        target_id:
          plugin: mw_process_entity_media
        alt: alt
        title: title
  pseudo_field_imagemedia_destiny:
    -
      plugin: concat_data
      source:
        - '@pseudo_field_image'
      method: process
  field_imagemedia:
    -
      plugin: sub_process
      source: '@pseudo_field_imagemedia_destiny'
      method: process
      process:
        target_id: target_id
  field_archivo:
    -
      plugin: skip_on_empty
      source: field_archivo
      method: process
    -
      plugin: sub_process
      method: process
      process:
        bundle: bundle
        field_name_destiny: field_media_document
        source_full_path:
          -
            plugin: mw_concat
            delimiter: /
            source:
              - source_base_path
              - filepath
          -
            plugin: urlencode
        uri_dest:
          plugin: mw_file_copy
          source:
            - '@source_full_path'
            - uri
        target_id:
          plugin: mw_process_entity_file
          source:
            - '@source_full_path'
            - '@uri_dest'
            - filename
            - filemime
            - filesize
            - status
            - created
            - changed
            - uid
        description: description
  field_booleano:
    -
      plugin: skip_on_empty
      source: field_booleano
      method: process
    -
      plugin: sub_process
      process:
        value: value
        format: format
destination:
  plugin: 'entity:node'
migration_dependencies:
  required:
    - users_drupal7
    - none
